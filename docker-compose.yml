services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - FEISHU_APP_ID=${FEISHU_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET}
      - FEISHU_APP_TOKEN=${FEISHU_APP_TOKEN}
      - FEISHU_TABLE_ID=${FEISHU_TABLE_ID}
    restart: unless-stopped
    networks:
      - seeai-network

  frontend:
    build: ./frontend
    ports:
      - "5000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - seeai-network

networks:
  seeai-network:
    driver: bridge
